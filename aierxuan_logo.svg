<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#283593;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1" />
    </linearGradient>

    <!-- 高光渐变 -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:1" />
    </linearGradient>

    <!-- 文字渐变 -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e3f2fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="400" cy="400" r="380" fill="url(#bgGradient)" />

  <!-- 装饰环 -->
  <circle cx="400" cy="400" r="360" fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.5"/>

  <!-- 科技感装饰线条 -->
  <path d="M 150 400 Q 200 300 300 320" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.4"/>
  <path d="M 650 400 Q 600 500 500 480" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.4"/>

  <!-- 笔记本电脑图标 -->
  <g transform="translate(400, 280)">
    <!-- 屏幕 -->
    <rect x="-120" y="-80" width="240" height="150" rx="8" fill="#37474f" stroke="url(#accentGradient)" stroke-width="3"/>
    <!-- 屏幕内部 -->
    <rect x="-105" y="-65" width="210" height="120" rx="4" fill="#263238"/>
    <!-- 屏幕光效 -->
    <rect x="-105" y="-65" width="210" height="60" rx="4" fill="url(#accentGradient)" opacity="0.15"/>
    <!-- 代码线条 -->
    <rect x="-85" y="-45" width="60" height="4" rx="2" fill="#42a5f5" opacity="0.8"/>
    <rect x="-85" y="-32" width="90" height="4" rx="2" fill="#66bb6a" opacity="0.6"/>
    <rect x="-85" y="-19" width="45" height="4" rx="2" fill="#42a5f5" opacity="0.8"/>
    <rect x="-85" y="-6" width="75" height="4" rx="2" fill="#ffb74d" opacity="0.6"/>
    <rect x="-85" y="7" width="55" height="4" rx="2" fill="#42a5f5" opacity="0.8"/>
    <rect x="-85" y="20" width="80" height="4" rx="2" fill="#66bb6a" opacity="0.6"/>
    <!-- 键盘基座 -->
    <path d="M -140 70 L -120 70 L -105 85 L 105 85 L 120 70 L 140 70 L 140 90 Q 140 100 130 100 L -130 100 Q -140 100 -140 90 Z" fill="#455a64"/>
    <!-- 触控板 -->
    <rect x="-40" y="75" width="80" height="15" rx="3" fill="#37474f"/>
  </g>

  <!-- 公司名称 AIERXUAN -->
  <text x="400" y="480" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" text-anchor="middle" letter-spacing="4">
    AIERXUAN
  </text>

  <!-- 副标题 -->
  <text x="400" y="540" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#90caf9" text-anchor="middle" letter-spacing="6">
    OEM / ODM
  </text>

  <!-- 底部装饰线 -->
  <line x1="250" y1="570" x2="550" y2="570" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>

  <!-- Laptop & Mini PC 标识 -->
  <text x="400" y="610" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#64b5f6" text-anchor="middle" letter-spacing="2">
    LAPTOPS &amp; MINI PC
  </text>

  <!-- 角落装饰点 -->
  <circle cx="180" cy="180" r="6" fill="url(#accentGradient)" opacity="0.5"/>
  <circle cx="620" cy="180" r="6" fill="url(#accentGradient)" opacity="0.5"/>
  <circle cx="180" cy="620" r="6" fill="url(#accentGradient)" opacity="0.5"/>
  <circle cx="620" cy="620" r="6" fill="url(#accentGradient)" opacity="0.5"/>
</svg>